name: job-tracker-ci

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Set up Node JS
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: |
                ./server/package-lock.json    
                ./client/package-lock.json

        - name: Install and Build Server
          run: |
            cd server
            npm install
            npm run build
        
        - name: Install and Build Client
          run: |
            cd client
            npm install
            npm run build
